; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = xiao-esp32s3, xiao-esp32s3-debug

[env:xiao-esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_src_filter =
	+<*>
	-<wifi_diag.cpp>

; For ESP32-S3 boards with native USB (keeps Serial output working without extra settings)
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
	adafruit/Adafruit BME680 Library@^2.0.4
	adafruit/Adafruit Unified Sensor@^1.1.15
	marian-craciunescu/ESP32Ping@^1.7

[env:xiao-esp32s3-debug]
extends = env:xiao-esp32s3
build_flags =
	${env:xiao-esp32s3.build_flags}
	-D DEVICE_DEBUG_MODE=1

[env:native]
platform = native
test_framework = unity
test_build_src = false
build_src_filter = -<*>
build_flags = -std=gnu++17
